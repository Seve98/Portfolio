<div class="card card-side bg-base-100 shadow-sm border mt-10">
  <div class="card-body">
    <h2 class="card-title">{{ title }}</h2>
    <p>{{ description }}</p>

    <div class="card-actions justify-end">
      <a [href]="link" target="_blank"
        ><button class="btn btn-custom">Vai al progetto</button></a
      >
    </div>
  </div>
</div>
