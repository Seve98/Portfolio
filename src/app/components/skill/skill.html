<section class="py-16 px-4 bgp min-h-screen">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-12">
      <h2 class="text-5xl lg:text-6xl font-bold mb-4">
        <span class="text-white">Le Mie </span>
        <span class="text-gradient">Skills</span>
      </h2>
      <p class="text-gray-400 text-lg max-w-3xl mx-auto">
        Tecnologie e strumenti che utilizzo quotidianamente per creare
        applicazioni web moderne
      </p>
    </div>

    <!-- Ciclo sugli environment -->
    <div *ngFor="let env of environment" class="mb-12">
      <!-- Titolo Environment -->
      <div class="flex items-center gap-3 mb-6" data-aos="fade-right">
        <div class="w-8 h-2 bg-orange-500 rounded-full"></div>
        <h3 class="text-3xl font-bold text-white">{{ env.name }}</h3>
      </div>

      <!-- Grid delle skills -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <ng-container *ngFor="let skill of getSkillsByEnv(env.name)">
          <div
            data-aos="fade-up"
            class="bgp rounded-xl p-6 border border-gray-700 hover:border-orange-500 transition-all duration-300 hover:transform hover:-translate-y-1"
          >
            <!-- Icon e Nome -->
            <div class="flex items-center gap-4 mb-4">
              <div class="flex-shrink-0">
                <img
                  *ngIf="skill.icon"
                  [src]="skill.icon"
                  [alt]="skill.name"
                  class="w-12 h-12 object-contain"
                />
              </div>
              <div class="flex-1 min-w-0">
                <h4 class="text-xl font-bold text-white">
                  {{ skill.name }}
                </h4>
                <p class="text-sm text-gray-400">
                  {{ skill.description }}
                </p>
              </div>
              <div class="flex-shrink-0">
                <span class="text-xl font-bold text-orange-500"
                  >{{ skill.value }}%</span
                >
              </div>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</section>
