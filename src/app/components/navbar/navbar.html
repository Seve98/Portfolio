<nav class="navbar fixed top-0 z-[100] bg-base-100 shadow-lg">
  <div class="navbar-start lg:hidden">
    <button
      class="btn btn-ghost"
      (click)="toggleMenu($event)"
      aria-label="Toggle menu"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h8m-8 6h16"
        />
      </svg>
    </button>
  </div>

  <div class="navbar-start hidden lg:flex">
    <a
      (click)="scrollToSection('landing', $event)"
      class="btn btn-ghost text-gradient normal-case text-2xl cursor-pointer"
    >
      Severino Santalucia
    </a>
  </div>

  <div class="navbar-end hidden lg:flex">
    <ul class="menu menu-horizontal px-1 gap-2">
      <li>
        <a
          (click)="scrollToSection('landing', $event)"
          class="hover:text-gradient transition-colors"
          >Home</a
        >
      </li>
      <li>
        <a
          (click)="scrollToSection('about-me', $event)"
          class="hover:text-gradient transition-colors"
          >Chi Sono</a
        >
      </li>
      <li>
        <a
          (click)="scrollToSection('skill', $event)"
          class="hover:text-gradient transition-colors"
          >Skills</a
        >
      </li>
      <li>
        <a
          (click)="scrollToSection('service', $event)"
          class="hover:text-gradient transition-colors"
          >Servizi</a
        >
      </li>
      <li>
        <a
          (click)="scrollToSection('projects', $event)"
          class="hover:text-gradient transition-colors"
          >Progetti</a
        >
      </li>
      <li>
        <a
          (click)="scrollToSection('contact', $event)"
          class="hover:text-gradient transition-colors"
          >Contattami</a
        >
      </li>
    </ul>
  </div>
</nav>

<div class="lg:hidden">
  <div
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] transition-opacity duration-300"
    [class.opacity-100]="isMenuOpen"
    [class.pointer-events-auto]="isMenuOpen"
    [class.opacity-0]="!isMenuOpen"
    [class.pointer-events-none]="!isMenuOpen"
    (click)="closeMenu()"
  ></div>

  <aside
    class="fixed top-0 left-0 h-screen w-[280px] bgp z-[120] shadow-2xl transition-transform duration-300 ease-in-out p-6 flex flex-col"
    [class.translate-x-0]="isMenuOpen"
    [class.-translate-x-full]="!isMenuOpen"
  >
    <div class="flex items-center justify-between mb-8">
      <span class="text-xl font-bold text-gradient">Severino Santalucia</span>
      <button (click)="closeMenu()" class="btn btn-circle btn-sm btn-ghost">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <ul class="menu menu-lg gap-2 p-0">
      <li><a (click)="scrollToSection('landing', $event)">Home</a></li>
      <li><a (click)="scrollToSection('about-me', $event)">Chi Sono</a></li>
      <li><a (click)="scrollToSection('skill', $event)">Skills</a></li>
      <li><a (click)="scrollToSection('service', $event)">Servizi</a></li>
      <li><a (click)="scrollToSection('projects', $event)">Progetti</a></li>
      <li><a (click)="scrollToSection('contact', $event)">Contattami</a></li>
    </ul>
  </aside>
</div>
